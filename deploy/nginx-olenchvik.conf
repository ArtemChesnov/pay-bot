# Default server (port 80) — заглушка для запросов не к olenchvik.ru
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    root /var/www/html;
    index index.html index.htm index.nginx-debian.html;
    location / {
        try_files $uri $uri/ =404;
    }
}

# HTTP → HTTPS для olenchvik.ru (managed by Certbot)
server {
    listen 80;
    listen [::]:80;
    server_name olenchvik.ru www.olenchvik.ru;
    return 301 https://$host$request_uri;
}

# HTTPS — бот на olenchvik.ru, проксирование на приложение (port 3000)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name olenchvik.ru www.olenchvik.ru;

    # SSL (Certbot)
    ssl_certificate /etc/letsencrypt/live/olenchvik.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/olenchvik.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
