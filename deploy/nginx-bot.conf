# Nginx: reverse proxy для Pay-bot (HTTPS -> localhost:3000)
# Скопировать в /etc/nginx/sites-available/bot и включить симлинк в sites-enabled.
# Заменить bot.example.ru на свой домен. SSL добавляется через: certbot --nginx -d bot.example.ru

server {
    listen 80;
    server_name bot.example.ru;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
